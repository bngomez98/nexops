name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        id: lint
        continue-on-error: true
        run: pnpm lint

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Unit tests
        id: test
        continue-on-error: true
        run: pnpm test

      - name: Build
        id: build
        continue-on-error: true
        run: pnpm build
        env:
          # Stub secrets so the build succeeds in CI without real credentials
          RESEND_API_KEY: re_dummy
          NEXT_PUBLIC_SITE_URL: https://nexusoperations.org
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: placeholder_publishable_key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder

      - name: Fail if any quality check failed
        if: always()
        run: |
          failed=0

          if [ "${{ steps.lint.outcome }}" != "success" ]; then
            echo "❌ Lint failed"
            failed=1
          fi

          if [ "${{ steps.typecheck.outcome }}" != "success" ]; then
            echo "❌ Typecheck failed"
            failed=1
          fi

          if [ "${{ steps.test.outcome }}" != "success" ]; then
            echo "❌ Unit tests failed"
            failed=1
          fi

          if [ "${{ steps.build.outcome }}" != "success" ]; then
            echo "❌ Build failed"
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
