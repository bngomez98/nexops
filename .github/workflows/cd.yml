name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Vercel Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      (github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    permissions:
      contents: read
      deployments: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Validate deployment secrets
        id: preflight
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deployment because one or more Vercel secrets are missing."
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.deploy_enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.preflight.outputs.deploy_enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        if: steps.preflight.outputs.deploy_enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Vercel CLI
        if: steps.preflight.outputs.deploy_enabled == 'true'
        run: pnpm add --global vercel@latest

      - name: Pull Vercel environment information
        if: steps.preflight.outputs.deploy_enabled == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build project artifacts
        if: steps.preflight.outputs.deploy_enabled == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt artifacts to production
        if: steps.preflight.outputs.deploy_enabled == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
