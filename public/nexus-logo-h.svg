<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <!-- Orbital icon (same mark as vertical logo, scaled to fit horizontal layout) -->
  <!-- Outer orbital ring 1 (tilted left ellipse) -->
  <ellipse cx="80" cy="80" rx="55" ry="24" transform="rotate(-40 80 80)" stroke="#3aad58" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Outer orbital ring 2 (tilted right ellipse) -->
  <ellipse cx="80" cy="80" rx="55" ry="24" transform="rotate(40 80 80)" stroke="#3aad58" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Inner orbital ring 1 -->
  <ellipse cx="80" cy="80" rx="28" ry="12" transform="rotate(-40 80 80)" stroke="#3aad58" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Inner orbital ring 2 -->
  <ellipse cx="80" cy="80" rx="28" ry="12" transform="rotate(40 80 80)" stroke="#3aad58" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Center cross/node -->
  <line x1="80" y1="66" x2="80" y2="94" stroke="#3aad58" stroke-width="4" stroke-linecap="round"/>
  <line x1="66" y1="80" x2="94" y2="80" stroke="#3aad58" stroke-width="4" stroke-linecap="round"/>

  <!-- "nexus" text -->
  <text x="155" y="73" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="42" font-weight="300" fill="#ffffff" letter-spacing="-1">nexus</text>
  <!-- "operations" text -->
  <text x="155" y="118" font-family="'Arial', 'Helvetica Neue', sans-serif" font-size="42" font-weight="300" fill="#ffffff" letter-spacing="-1">operations</text>
</svg>
